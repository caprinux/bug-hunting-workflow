pipeline:
  output_dir: ./audit_output
  verbose: true
  retry_limit: 3
  subagent_timeout: 3600
  resume: true
  auto_install_tools: true
  bug_schema_version: '1.0'
  request_delay: 0
  max_concurrent_infra_agents: 5
engagement:
  type: source_code
  source_path: ''
  source_repo: ''
  target_domains: []
  scope_definition: ''
  infra_config: ''
bug_hunter:
  agents:
  - claude
  - codex
  exclude_paths: []
  codex_model: gpt-5.4
deduplicator:
  enabled: false
  similarity_threshold: 0.8
strict_validator:
  destructive_poc_policy: cannot_validate
  max_concurrent: 5
  poc_language: python
perfectionist:
  max_concurrent: 3
strict_triager:
  contrived_threshold: 3
  severity_floor: low
bug_chainer:
  max_concurrent: 2
models:
  scoper: opus
  bug_hunter_subagent: opus
  deduplicator: opus
  strict_validator: opus
  perfectionist: opus
  strict_triager: opus
  bug_chainer: opus
auth:
  password: ''
