pipeline:
  output_dir: ./audit_output
  verbose: true
  retry_limit: 3
  subagent_timeout: 100000
  resume: true
  auto_install_tools: true
  bug_schema_version: '1.0'
  request_delay: 0.0
  max_concurrent_infra_agents: 5
  codex_reasoning_effort: xhigh
  codex_reasoning_summary: auto
engagement:
  type: source_code
  source_path: ''
  source_repo: ''
  target_domains: []
  scope_definition: ''
  infra_config: ''
bug_hunter:
  agents:
  - claude
  - codex
  iterations: 1
  mode: parallel
  exclude_paths: []
  codex_model: gpt-5.5
deduplicator:
  enabled: false
  similarity_threshold: 0.8
strict_validator:
  destructive_poc_policy: cannot_validate
  max_concurrent: 5
  poc_language: python
perfectionist:
  enabled: false
  max_concurrent: 3
strict_triager:
  contrived_threshold: 3
  severity_floor: low
bug_chainer:
  enabled: false
  max_concurrent: 2
  rehunt_auto_approve: false
scoper:
  enabled: false
skills_hunter:
  enabled: true
variant_hunter:
  enabled: true
models:
  scoper: gpt-5.5
  skills_hunter: gpt-5.5
  bug_hunter_subagent: claude-opus-4-8[1m]
  variant_hunter: gpt-5.5
  deduplicator: gpt-5.5
  strict_validator: gpt-5.5
  perfectionist: gpt-5.5
  strict_triager: gpt-5.5
  bug_chainer: gpt-5.5
sandbox:
  # Isolate each parallel hunting agent in its own Docker container (private
  # filesystem view; can't see each other or write outside /work). Requires the
  # bhw-agent image (built by setup/ubuntu-24-04-setup.sh). Default off.
  enabled: false
  image: bhw-agent:latest
  network: true
auth:
  password: ''
broad_bug_hunter:
  agents:
  - claude
  - codex
  iterations: 1
  mode: parallel
  exclude_paths: []
  codex_model: gpt-5.5
