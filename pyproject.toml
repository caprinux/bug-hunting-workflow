[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# The live tier hits real LLM APIs and costs money — opt in explicitly with
#   pytest -m live        (and RUN_LIVE_E2E=1)
# Everything else is offline and deterministic.
markers = [
    "live: end-to-end tests that call real Claude/Codex APIs (opt-in, slow, costs money)",
]
addopts = "-ra"
